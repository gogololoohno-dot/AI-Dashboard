name: Refresh Dashboard Data

on:
  schedule:
    # Full refresh: twice daily (3am + 3pm UTC = 10am + 10pm ICT)
    - cron: '0 3,15 * * *'
    # Patch incomplete subnets: every 4 hours in between (6am, 9am, 12pm, 6pm, 9pm, 12am UTC)
    # Staggered across the day to give rate limits time to recover
    - cron: '0 6,9,12,18,21,0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which refresh to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - patch

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 3,15 * * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=patch" >> $GITHUB_OUTPUT
          fi

      - name: Install Playwright browsers (full mode only)
        if: steps.mode.outputs.mode == 'full'
        run: npx playwright install --with-deps chromium

      - name: Fetch Artemis x402 data (full mode only)
        if: steps.mode.outputs.mode == 'full'
        run: node scripts/fetch-artemis.mjs
        timeout-minutes: 5
        continue-on-error: true

      - name: Full Bittensor fetch (full mode)
        if: steps.mode.outputs.mode == 'full'
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: node scripts/fetch-daily.mjs
        timeout-minutes: 45
        continue-on-error: true

      - name: Patch incomplete subnets (patch mode)
        if: steps.mode.outputs.mode == 'patch'
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: node scripts/fetch-incomplete.mjs
        timeout-minutes: 15
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/owners.json public/data/subnets-extra.json public/data/agentic.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase
            git commit -m "chore: ${{ steps.mode.outputs.mode }} refresh [skip ci]"
            git push
          fi
