name: Refresh Daily Dashboard Data

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC (3pm ICT)
  workflow_dispatch: {}    # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Fetch Artemis x402 agentic payments data
        run: node scripts/fetch-artemis.mjs
        timeout-minutes: 5

      - name: Fetch Bittensor owner + subnet data from taostats
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: node scripts/fetch-daily.mjs
        timeout-minutes: 30

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/owners.json public/data/subnets-extra.json public/data/agentic.json
          git diff --cached --quiet || git commit -m "chore: refresh daily dashboard data [skip ci]"
          git push
